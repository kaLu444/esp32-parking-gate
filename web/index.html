<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f3ed">
    <title>ESP32 Parking Gate</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Firebase Realtime Database</p>
          <h1>ESP32 Parking Gate</h1>
        </div>
        <div class="connection-pill" id="connectionStatus">Firebase nije podesen</div>
      </header>

      <main>
        <section class="device-strip" aria-label="Izbor uredjaja">
          <label class="field device-field" for="deviceIdInput">
            <span>Device ID</span>
            <input id="deviceIdInput" type="text" value="esp32_1" autocomplete="off">
          </label>
          <button class="primary-button" id="connectButton" type="button">
            <i data-lucide="radio-tower"></i>
            Povezi
          </button>
        </section>

        <section class="status-grid" aria-label="Trenutno stanje">
          <article class="metric-panel">
            <span class="metric-label">Rampa</span>
            <strong id="gateState">--</strong>
            <small id="lastUpdate">Nema podataka</small>
          </article>
          <article class="metric-panel">
            <span class="metric-label">Auto</span>
            <strong id="carState">--</strong>
            <small id="distanceState">Udaljenost: --</small>
          </article>
          <article class="metric-panel">
            <span class="metric-label">Rezim</span>
            <strong id="modeState">--</strong>
            <small id="buzzerState">Buzzer: --</small>
          </article>
          <article class="metric-panel">
            <span class="metric-label">Poslednja komanda</span>
            <strong id="lastCommandName">--</strong>
            <small id="lastCommandValue">--</small>
          </article>
        </section>

        <section class="workspace-grid">
          <div class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Komande</p>
                <h2>Kontrola uredjaja</h2>
              </div>
              <button class="ghost-button" id="refreshStateButton" type="button">
                <i data-lucide="refresh-cw"></i>
                Osvezi
              </button>
            </div>
            <div class="command-grid" id="commandGrid"></div>
          </div>

          <aside class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Config</p>
                <h2>Podesavanja</h2>
              </div>
            </div>
            <form class="config-form" id="configForm">
              <label class="field" for="displayNameInput">
                <span>Naziv uredjaja</span>
                <input id="displayNameInput" type="text" value="Parking kapija">
              </label>
              <label class="field" for="detectionDistanceInput">
                <span>Detekcija auta (cm)</span>
                <input id="detectionDistanceInput" type="number" min="5" max="200" step="1" value="20">
              </label>
              <label class="field" for="gateOpenMsInput">
                <span>Vreme otvorene rampe (ms)</span>
                <input id="gateOpenMsInput" type="number" min="1000" max="30000" step="500" value="4000">
              </label>
              <label class="toggle-row" for="buzzerEnabledInput">
                <span>Buzzer ukljucen</span>
                <input id="buzzerEnabledInput" type="checkbox" checked>
              </label>
              <label class="field" for="modeInput">
                <span>Rezim rada</span>
                <select id="modeInput">
                  <option value="auto">auto</option>
                  <option value="manual">manual</option>
                </select>
              </label>
              <button class="primary-button full-width" type="submit">
                <i data-lucide="save"></i>
                Sacuvaj config
              </button>
            </form>
          </aside>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Istorija</p>
              <h2>Poslednje komande</h2>
            </div>
          </div>
          <div class="command-log" id="commandLog"></div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
